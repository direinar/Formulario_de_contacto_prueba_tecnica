<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <title>Formulario</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="card shadow">
                    <div class="card-body">
                        <h4 class="card-title mb-4 text-center">Formulario de contacto</h4>

                        <form id="formulario">

                            <!-- Nombre -->
                            <div class="mb-3">
                                <label class="form-label">Nombre</label>
                                <input id="nombre" type="text" class="form-control" placeholder="Ingresa tu nombre"
                                    minlength="2" maxlength="80" required>
                            </div>

                            <!-- Email -->
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input id="email" type="email" class="form-control" placeholder="Ingresa tu email"
                                    required>
                            </div>

                            <!-- Mensaje -->
                            <div class="mb-3">
                                <label class="form-label">Mensaje</label>
                                <textarea id="mensaje" class="form-control" rows="4" placeholder="Escribe tu mensaje"
                                    minlength="5" maxlength="1000" required></textarea>
                            </div>

                            <!-- Botón -->
                            <div class="d-grid">
                                <button class="btn btn-success">Enviar</button>
                            </div>

                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        const formulario = document.getElementById("formulario");

        formulario.addEventListener("submit", async (e) => {
            e.preventDefault();

            const nombre = document.getElementById("nombre").value.trim();
            const email = document.getElementById("email").value.trim();
            const mensaje = document.getElementById("mensaje").value.trim();

            if (nombre.length < 2 || nombre.length > 80) {
                Swal.fire({
                    icon: "warning",
                    title: "Nombre invalido",
                    text: "El nombre debe tener entre 2 y 80 caracteres"
                });
                return;
            }
            if (mensaje.length < 5 || mensaje.length > 1000) {
                Swal.fire({
                    icon: "warning",
                    title: "Mensaje invalido",
                    text: "El mensaje debe tener entre 5 y 1000 caracteres"
                });
                return;
            }

            const data = {
                nombre,
                email,
                mensaje
            };

            try {
                const response = await fetch("/api/contacto", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });

                const mensaje = await response.text();

                if (!response.ok) {
                    Swal.fire({
                        icon: "error",
                        title: "No se pudo enviar",
                        text: mensaje || "No se pudo enviar el correo"
                    });
                    return;
                }

                Swal.fire({
                    icon: "success",
                    title: "Correo enviado",
                    text: mensaje || "Mensaje enviado correctamente",
                    confirmButtonText: "Aceptar"
                });
                formulario.reset();
            } catch (error) {
                Swal.fire({
                    icon: "error",
                    title: "Error de red",
                    text: "Error de red al intentar enviar el formulario"
                });
            }
        });
    </script>

</body>

</html>
